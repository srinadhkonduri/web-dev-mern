<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature converter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <h2>🌡️ Temperature Converter</h2>

            <div class="input-group">
                <label for="temperature">Enter Temperature</label>
                <input type="number" id="temperature" placeholder="e.g. 32">
            </div>

            <div class="input-group">
                <label for="conversionType">Conversion Type</label>
                <select id="conversionType">
                    <option value="toCelsius">Fahrenheit → Celsius</option>
                    <option value="toFahrenheit">Celsius → Fahrenheit</option>
                </select>
            </div>

            <button id="buttonId">Convert</button>

            <div class="result-box">
                <h3>Result</h3>
                <p id="result">--</p>
            </div>
        </div>
    </div>

    <script src="./script.js"></script>
</body>
</html>
