<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class List</title>
    <style>
        .highLight{
            background-color: yellow;
            max-width: 10rem;
        }
        .bold{
            font-style: bold;
        }
        .italic{
            font-style: italic;
        }
        .color{
            color: brown;
        }
        
    </style>
</head>
<body>
    
    <div id="container">
        <p id="textElement">This is my classes</p>
        <button onclick="addClass()">Add class</button>
        <button onclick="removeClass()">remove class</button>
        <button onclick="replaceClass()">replace class</button>
        <button onclick="toggleClass()">toggle class</button>
        <button onclick="containsClass()">contains class</button>
        <button onclick="listItem()">list item</button>
        <button onclick="getItem()">get value</button>
    </div>

    <script src="./script.js"></script>
</body>
</html>
