<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Savings Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="left">
            <img src="./heylizart-autumn-8416137_1920.png" alt="">
        </div>
        <div class="right">
            <label for="">Enter total savings amount</label>
            <br>
            <input type="number" id="amount" placeholder="Eg : 30000">

            <br><br><br>

            <label for="">Enter the current amount you have</label>
            <br>
            <input type="number" id="currentAmount" placeholder="Eg : 2000">

            <br><br><br>

            <label for="">Monthly Contribution</label>
            <br>
            <input type="number" id="monthlySaving" placeholder="Eg : 200">

            <label for="">Months required to save</label>
            <br>
            <input type="number" id="result" placeholder="Eg : 10 months">

            <button id="buttonId">Calculate Now</button>

        </div>
    </div>


    <script src="./script.js"></script>
</body>
</html>
