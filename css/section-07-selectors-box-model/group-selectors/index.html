<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h1,h2{
            color: purple;
        }
        ul{
            list-style-type: none;
        }
        [data-priority='high']{
            color: green;
        }
        [data-priority='low']{
            color: red;
        }

    </style>
</head>
<body>
    <h1>Group and attributes selectors</h1>

    <h2>Task List</h2>

    <ul>
        <li data-priority="high">one</li>
        <li data-priority="low">Two</li>
        <li data-priority="high">Three</li>
        <li data-priority="low">Four</li>
    </ul>
</body>
</html>
