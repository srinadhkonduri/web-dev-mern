<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tables in HTML</title>
    <style>
        table{
            border-collapse: collapse;
            width: 100%;
        }
        th,td{
            border: 1px solid black;
            padding: 10px;
        }
        th {
            text-align: left;
            padding: 8px;
        }
        
    </style>
</head>
<body>
    <h1>Tables in HTML</h1>
    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Subject</th>
                <th>Marks</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Tony</td>
                <td>Physics</td>
                <td>98</td>
            </tr>
            <tr>
                <td>Captain</td>
                <td>History</td>
                <td>99</td>
            </tr>
            <tr>
                <td>Hulk</td>
                <td>War</td>
                <td>80</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
