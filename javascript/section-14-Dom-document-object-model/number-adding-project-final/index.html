<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number adding project</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="container">
        <h2>Number adding Project</h2>

        <input class="number-box" id="number1" type="number" placeholder="Enter the number 1">
        <span id="plus-symbol">+</span>
        <input class="number-box" type="number" id="number2" placeholder="Enter the number 2">

        <button type="button" id="calculate">Calculate</button>

        <div class="result">Result : </div>
    </div>


    <script src="./script.js"></script>
</body>
</html>
