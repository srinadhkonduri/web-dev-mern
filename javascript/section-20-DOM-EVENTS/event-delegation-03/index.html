<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Delegation</title>
</head>
<body>

    <ul id="item-list">
        <li data-item="1"><span>Item 1</span></li>
        <li data-item="2"><span>Item 2</span></li>
        <li data-item="3"><span>Item 3</span></li>
    </ul>

    <script>
        document.getElementById('item-list').addEventListener('click', function(event) {
            console.log(event);

            // FIX: handle nested elements safely
            const clicked = event.target.closest('li');

            // Ensure click is inside this UL only
            if (clicked && this.contains(clicked)) {
                console.log(clicked.tagName);

                const itemNumber = clicked.getAttribute('data-item');
                console.log(itemNumber);
            }
        });
    </script>

</body>
</html>
