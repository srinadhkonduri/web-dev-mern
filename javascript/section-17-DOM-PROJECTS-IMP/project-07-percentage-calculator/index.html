<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Percentage Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Percentage Calculator
        </h2>

        <div class="content">
            <div class="left">
                <label for="">Enter Amount</label>
                <br>
            <input type="number" id="amount" placeholder="Eg : 2500">
            
            <br><br><br>

            <label for="">Percentage</label>
            <br>
            <input type="number" id="percentage" placeholder="Eg : 10">

            <button id="buttonId">Calculate</button>
            </div>

            <div class="right">
                <label for="">Result Amount :</label>
                <br>
                <input type="number" id="resultAmount" placeholder="0">

                <br><br><br>

                <label for="">Percentage Amount</label>
                <input type="number" id="percentage-amount" placeholder="0">
            </div>
        </div>
    </div>


    <script src="./script.js"></script>
</body>
</html>
