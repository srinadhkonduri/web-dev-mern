<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>counter and stop watch project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="counter-app">
            <div class="heading-container">
                <h3 id="heading">Counter - App</h3>
            </div>
            <p id="para">This is a simple counter app use the buttons to increase decrease and reset the values</p>
            <h1 id="result">0</h1>
            <div class="button-container">
                <button class="buttons" id="increase">Increase</button>
                <button class="buttons" id="decrease">Decrease</button>
                <button class="buttons" id="reset">Reset</button>
            </div>
        </div>

        <!-- ================================================= -->

        <div class="stop-watch">
            <h3>Stop Watch</h3>
            <p>Enter the time you want in seconds</p>
            <input type="number" id="input" placeholder="Eg: 35">
            <p id="result1">Remaining Time : </p>
            <button id="buttonId">Start</button>
        </div>
    
    </div>




    <script src="./script.js"></script>
</body>
</html>
