<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Using Child Node</title>
</head>
<body>
    <div id="outerDiv">
        <div class="innerDiv">
            <ul id="listSection">
                <li data="fruit">Apple</li>
                <li data="vegetable">Carrot</li>
            </ul>
        </div>
    </div>


    <script>
        const outerMostEle = document.getElementById('outerDiv');

        const innerMostEle = outerMostEle.childNodes;
        console.log(innerMostEle);

        const ulSection = innerMostEle.childNodes;
        console.log(ulSection);
        
        
    </script>
</body>
</html>
