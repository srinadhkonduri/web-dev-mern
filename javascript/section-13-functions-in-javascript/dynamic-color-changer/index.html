<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic color changer</title>
    <style>
        button{
            font-size: 30px;
            margin: 5px;
            padding: 10px;
            border-radius: 50px;
            border: 3px solid orange;
            background-color: rgb(134, 134, 200);
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1 class="title" style="text-align: center;">Dynamic color changer</h1>
    <div class="container" style="text-align: center;">
        <button class="color">Change Background color</button>
        <button class="increase">Increase title size</button>
        <button class="reset">Reset</button>
    </div>


    <script src="./script.js"></script>
</body>
</html>
