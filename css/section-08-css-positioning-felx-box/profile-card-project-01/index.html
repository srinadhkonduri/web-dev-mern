<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>profile card using flex box</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    
    <!-- profile card -->
    <div class="profile-card">
        <!-- side bar starts here -->
        <div class="profile-sidebar">
            <img src="./peacock-image.jpg" alt=""  class="profile-photo">
            <h1 class="p-name">Tony Stark</h1>
            <p class="job-title">
                    senior developer
            </p>
            <p id="com" class="comapny-card">
                    Amazon Inc
            </p>
        </div>
        <!-- profile side bar ends here -->
        <!-- main starts -->
        <div class="profile-main">
            <p class="bio">
                Lorem ipsum dolor sit amet consectetur adipisicing elit. Magni tempora quia nesciunt.
            </p>  
            <div class="contact-info">
                <p>tony@gmail.com (--) Tony stark</p> 
            </div>  
            <div class="social-links">
                <a href="">
                    <i class="fab fa-linkedin"></i>
                </a>
                <a href="">
                    <i class="fab fa-instagram"></i>
                </a>
                <a href="">
                    <i class="fab fa-youtube"></i>
                </a>
                <a href="">
                    <i class="fab fa-github"></i>
                </a>
            </div>  
            <div class="skills">
                <span class="skill">Javascript</span>
                <span class="skill">React</span>
                <span class="skill">Node JS</span>
                <span class="skill">Mongo DB</span>
            </div>  

            <!-- btn -->
            <button class="btn">VIEW FULL PROFILE</button>
        </div>
        <!-- main ends here -->
    </div>
    <!-- -profile card ends here -->
</body>
</html>
