<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="container">
        <button id="button1">Change</button>
        <p>This is the text</p>

        <button id="button2">Change</button>
        <p>This is the text</p>
        </div>


    <script>
        const containerEle = document.getElementById('container');

        // selecting all the buttons
        const buttonEle = document.querySelectorAll('button');
        console.log(buttonEle);

        buttonEle.forEach((butt) => {
            const nextEle = butt.nextSibling;
            if(nextEle.nodeType === 3){
                nextEle.textContent = `hi welcome`;
            }
        })
        
    </script>
</body>
</html>
