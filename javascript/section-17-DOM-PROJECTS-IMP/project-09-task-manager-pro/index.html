<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="container">

        <!-- logo -->
        <div class="logo"><i class="fa-solid fa-list-check"></i></div>

        <!-- title -->
        <h1>TaskMaster Pro</h1>
        <p>Your Personal Task Management Solution ⭐</p>

        <!-- input section -->
        <div class="input-section">
            <input type="text" id="taskInput" placeholder="Enter your task">
            <button id="addTaskBtn">+ Add Task</button>
        </div>

        <!-- filters -->
        <div class="filters">
        <button class="filter active" data-type="all">All</button>
        <button class="filter" data-type="completed">Completed</button>
        <button class="filter" data-type="pending">Pending</button>
        </div>

        <!-- Task List -->
        <ul id="taskList"></ul>

    </div>


    <script src="./script.js"></script>
</body>
</html>
